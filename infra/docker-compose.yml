services:
  mysql:
    image: mysql:8.0
    container_name: qsd-admin-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: qsd_admin
      MYSQL_ROOT_PASSWORD: root123456
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql-data:/var/lib/mysql

  redis:
    image: redis:7.2
    container_name: qsd-admin-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command:
      - redis-server
      - --appendonly
      - "yes"
    volumes:
      - redis-data:/data

volumes:
  mysql-data:
  redis-data:
